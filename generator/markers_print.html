<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>ArUco Markers Print Sheet</title>
    <style>
        /* Print styling rules */
        @media print {
            body {
                margin: 0;
                padding: 0;
                background-color: white;
            }
            .page {
                margin: 0 !important;
                box-shadow: none !important;
                page-break-after: always;
            }
            .page:last-child {
                page-break-after: avoid;
            }
        }
        @page {
            size: A4 portrait;
            margin: 0;
        }
        
        /* Screen preview styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            width: calc(210mm - 50px);
        }
        .header h1 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: #2f3640;
        }
        .header p {
            margin: 3px 0;
            font-size: 0.9rem;
            color: #718093;
        }
        
        /* A4 Page layout container */
        .page {
            width: 210mm;
            height: 297mm;
            box-sizing: border-box;
            background-color: white;
            margin: 10px auto 30px auto;
            padding: 5.0mm;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
            overflow: hidden;
        }
        
        /* Individual Marker container */
        .marker-cell {
            width: 8.0mm;
            height: 8.0mm;
            padding: 1.0mm;
            border: 0.05mm solid #F0F0F0; /* Thin gray separation line */
            margin: -0.025mm; /* Collapse borders to prevent double thickness */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            box-sizing: content-box;
        }
        
        .marker-img {
            width: 8.0mm;
            height: 8.0mm;
            display: block;
            image-rendering: pixelated; /* Keeps ArUco squares sharp */
            image-rendering: crisp-edges;
        }
        
        /* Button to print from browser */
        .print-btn {
            background-color: #4cd137;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .print-btn:hover {
            background-color: #44bd32;
        }
    </style>
</head>
